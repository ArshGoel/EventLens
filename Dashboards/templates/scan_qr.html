{% extends 'base.html' %}

{% block title %}EventLens | Scan Event QR Code{% endblock %}

{% block extra_head %}
<!-- HTML5 QR Code Scanner Library -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" type="text/javascript"></script>
{% endblock %}

{% block content %}
<style>
    .scanner-container {
        max-width: 650px;
        margin: 0 auto;
        padding: 40px 24px;
        text-align: center;
    }

    .scanner-title {
        font-size: 2.2rem;
        margin-bottom: 10px;
        background: var(--primary-glow);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .scanner-subtitle {
        color: var(--text-muted);
        font-size: 1rem;
        margin-bottom: 30px;
    }

    #reader {
        width: 100%;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--border-color);
        background: rgba(0, 0, 0, 0.3);
        margin: 0 auto 24px auto;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        position: relative;
    }

    /* Override default html5-qrcode styling to fit our theme */
    #reader__dashboard {
        padding: 15px !important;
        background: rgba(15, 23, 42, 0.6) !important;
        border-top: 1px solid var(--border-color);
    }
    
    #reader__dashboard_section_csr button {
        background: var(--primary-glow) !important;
        color: white !important;
        border: none !important;
        padding: 10px 20px !important;
        border-radius: 8px !important;
        font-weight: 600 !important;
        cursor: pointer !important;
        font-family: inherit !important;
        font-size: 0.9rem !important;
        margin: 5px !important;
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }

    #reader__dashboard_section_csr button:hover {
        opacity: 0.9;
    }

    #reader__camera_selection {
        background: #1e293b !important;
        color: var(--text-main) !important;
        border: 1px solid var(--border-color) !important;
        padding: 8px 12px !important;
        border-radius: 8px !important;
        outline: none !important;
        margin: 10px 5px !important;
    }

    .scanner-controls {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 24px;
        align-items: center;
    }

    .file-input-wrapper {
        position: relative;
        display: inline-block;
    }

    .file-input-label {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-color);
        padding: 12px 24px;
        border-radius: 12px;
        color: var(--text-main);
        cursor: pointer;
        font-weight: 600;
        transition: background-color 0.3s, border-color 0.3s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .file-input-label:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: #6366f1;
    }

    #file-qr-input {
        position: absolute;
        left: 0;
        top: 0;
        opacity: 0;
        width: 100%;
        height: 100%;
        cursor: pointer;
    }

    .scan-status {
        padding: 16px;
        border-radius: 12px;
        margin-top: 20px;
        font-weight: 600;
        display: none;
    }

    .scan-status.success {
        background: rgba(16, 185, 129, 0.15);
        color: #34d399;
        border: 1px solid rgba(16, 185, 129, 0.25);
    }

    .scan-status.error {
        background: rgba(239, 68, 68, 0.15);
        color: #f87171;
        border: 1px solid rgba(239, 68, 68, 0.25);
    }
</style>

<div class="scanner-container">
    <div class="glass-card">
        <h2 class="scanner-title">Scan Event QR Code</h2>
        <p class="scanner-subtitle">Point your camera at a wedding QR code to access the gallery instantly</p>

        <!-- Camera scanning box -->
        <div id="reader"></div>

        <div class="scanner-controls">
            <span style="color: var(--text-muted); font-size: 0.9rem;">— OR —</span>
            
            <div class="file-input-wrapper">
                <label for="file-qr-input" class="file-input-label">
                    <span>🖼️ Upload QR Image</span>
                </label>
                <input type="file" id="file-qr-input" accept="image/*">
            </div>
        </div>

        <div id="scan-feedback" class="scan-status"></div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const feedback = document.getElementById("scan-feedback");
        let html5QrCode = null;

        function showFeedback(message, type) {
            feedback.textContent = message;
            feedback.className = `scan-status ${type}`;
            feedback.style.display = "block";
        }

        function onScanSuccess(decodedText, decodedResult) {
            console.log(`Scan result: ${decodedText}`);
            showFeedback("QR Code scanned successfully! Redirecting...", "success");
            
            // Stop scanning
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    window.location.href = decodedText;
                }).catch(err => {
                    console.error("Failed to stop scanner", err);
                    window.location.href = decodedText;
                });
            } else {
                window.location.href = decodedText;
            }
        }

        function onScanFailure(error) {
            // Quietly ignore scan failures during live feed (they happen every frame that has no QR code)
        }

        // Initialize Camera Scanner
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        // Start scanning with camera
        Html5Qrcode.getCameras().then(devices => {
            if (devices && devices.length) {
                // If camera devices exist, start scanning using the back/first camera
                let cameraId = devices[0].id;
                // Prefer back camera on mobile devices
                const backCamera = devices.find(device => device.label.toLowerCase().includes('back'));
                if (backCamera) {
                    cameraId = backCamera.id;
                }

                html5QrCode.start(
                    cameraId, 
                    config, 
                    onScanSuccess, 
                    onScanFailure
                ).catch(err => {
                    console.error("Error starting camera scan", err);
                    // Fall back to html5-qrcode's built-in file scan if camera fails
                    showFeedback("Camera access error. You can still scan by uploading an image below.", "error");
                });
            } else {
                showFeedback("No camera found. You can still scan by uploading an image below.", "error");
            }
        }).catch(err => {
            console.error("Error listing cameras", err);
            showFeedback("Camera initialization failed. Please try uploading an image instead.", "error");
        });

        // Handle QR Code Scanning via File Upload
        const fileInput = document.getElementById('file-qr-input');
        fileInput.addEventListener('change', e => {
            if (e.target.files.length === 0) {
                return;
            }

            const imageFile = e.target.files[0];
            const fileHtml5QrCode = new Html5Qrcode("reader");
            
            showFeedback("Processing image...", "success");

            fileHtml5QrCode.scanFile(imageFile, true)
                .then(decodedText => {
                    onScanSuccess(decodedText, null);
                })
                .catch(err => {
                    console.error("Error scanning file", err);
                    showFeedback("Failed to detect a QR code in the image. Please try a clearer picture.", "error");
                });
        });
    });
</script>
{% endblock %}
